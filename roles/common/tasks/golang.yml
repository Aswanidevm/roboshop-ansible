- name: Install GoLang
  ansible.builtin.yum:
    name: golang
    state: installed

- name: App Pre-requisites
  ansible.builtin.import_tasks:
    file: app-prereq.yml

- name: Install a list of packages with a list variable
  ansible.builtin.yum:
    name: "{{ go }}"
  vars:
    go:
    - mod init dispatch
    - get
    - build
  dest: /app

- name: Schema Setup
  ansible.builtin.import_tasks:
    file: schema-setup.yml
  when: schema_type is defined

- name: SystemD Setup
  ansible.builtin.import_tasks:
    file: systemd-setup.yml
